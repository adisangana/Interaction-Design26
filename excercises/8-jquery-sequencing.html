<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>Exercise 8: jQuery Sequencing</title>
    <link href="../resources/reset.css" rel="stylesheet"/>
    <meta name="viewport" content="width=device-width">

    <style>
        body {
            text-align: center;
        }

        div {
            width: 200px;
            height: 200px;
            display: inline-block;
            margin: 10px;
            opacity: 0;
        }

        #div1 {
            background: #264c89;
        }

        #div2 {
            background: #388967;
        }

        #div3 {
            background: #41bfc4;
        }

        h1 {
            font-size: 6em;
            opacity: 0;
        }

        h2 {
            position: relative;
            left: -300px;
            opacity: 0;
        }
    </style>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <h1>Exercise 8: jQuery Sequencing</h1>
    <h2>Example subheading</h2>

    <div id="div1"></div>
    <div id="div2"></div>
    <div id="div3"></div>

    <script>
        $("h1").animate(
            {
                opacity: 1,
                fontSize: "2em"
            },
            1500,
            "swing"
        );

        $("h2").delay(1750).animate(
            {
                opacity: 1,
                left: "0px"
            },
            1000,
            "swing"
        );

        $("#div1").delay(2500).animate(
            {
                opacity: 1
            },
            750
        );

        $("#div2").delay(3000).animate(
            {
                opacity: 1
            },
            750
        );

        $("#div3").delay(3500).animate(
            {
                opacity: 1
            },
            750
        );
    </script>
</body>
</html>
