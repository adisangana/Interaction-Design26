<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>Exercise 2: Keyframe Animation</title>
    <link href="../resources/reset.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width">

    <style>
        .pooltable {
            position: relative;
            width: 400px;
            height: 220px;
            background: #44a86b;
            border: 8px solid #775118;
        }

        .ball {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            top: 45%;
            left: 25px;
        }

        .eight {
            background: #000;
            left: 300px;
        }

        /* Straight shot for table 1 */
        @keyframes straightShot {
            0% {
                left: 25px;
            }

            100% {
                left: 360px;
            }
        }

        /* Bank shot for table 2 */
        @keyframes bankShot {
            0% {
                top: 45%;
                left: 25px;
            }

            33% {
                top: 0;
                left: 135px;
            }

            66% {
                top: 200px;
                left: 250px;
            }

            100% {
                top: 45%;
                left: 360px;
            }
        }

        /* Cue ball moves until it touches the 8-ball */
        @keyframes cueToEight {
            0% {
                left: 25px;
            }

            100% {
                left: 280px;
            }
        }

        /* 8-ball moves after being hit */
        @keyframes eightBall {
            0% {
                left: 300px;
            }

            100% {
                left: 380px;
            }
        }

        /* Table 1: straight shot */
        #table1:hover #cueball1 {
            animation: straightShot 2s ease forwards;
        }

        /* Table 2: bank shot */
        #table2:hover #cueball2 {
            animation: bankShot 3s ease forwards;
        }

        /* Table 3: cue ball stops when it reaches the 8-ball */
        #table3:hover #cueball3 {
            animation: cueToEight 2s linear forwards;
        }

        /* Table 3: 8-ball moves after the cue ball reaches it */
        #table3:hover #eightball {
            animation: eightBall 1s linear 2s forwards;
        }
    </style>
</head>

<body>
    <h1>Exercise 2: Keyframe Animation</h1>

    <h2>Straight shot</h2>
    <div class="pooltable" id="table1">
        <div class="ball" id="cueball1"></div>
    </div>

    <h2>Bank shot</h2>
    <div class="pooltable" id="table2">
        <div class="ball" id="cueball2"></div>
    </div>

    <h2>Sequential shot</h2>
    <div class="pooltable" id="table3">
        <div class="ball" id="cueball3"></div>
        <div class="eight ball" id="eightball"></div>
    </div>
</body>
</html>
