<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>Exercise 11 - Drag and Drop</title>
    <meta name="viewport" content="width=device-width">

    <script src="../resources/jquery.min.js"></script>
    <script src="../resources/jquery-ui.min.js"></script>

    <style>
        #space {
            width: 800px;
            height: 400px;
            background: url("../resources/wormhole.jpg");
            position: absolute;
        }

        #tardis {
            width: 200px;
            height: 200px;
            background: url("../resources/tardis.png");
            position: absolute;
            top: 100px;
        }

        #blackhole {
            width: 400px;
            height: 300px;
            background: rgba(0, 255, 0, 0);
            position: absolute;
            top: 50px;
            right: 100px;
        }

        @keyframes spin {
            from {
                transform: scale(1) rotate(0deg);
            }

            to {
                transform: scale(0.01) rotate(720deg);
            }
        }

        .animated {
            animation: spin 3s ease-out forwards;
        }
    </style>
</head>

<body>

    <div id="space">
        <div id="blackhole"></div>
        <div id="tardis"></div>
    </div>

    <script>
        $("#tardis").draggable();

        $("#blackhole").droppable({
            drop: function () {
                $("#tardis")
                    .addClass("animated")
                    .animate(
                        {
                            left: "400px",
                            top: "100px"
                        },
                        3000,
                        "easeOutQuad"
                    );
            }
        });
    </script>

</body>
</html>
