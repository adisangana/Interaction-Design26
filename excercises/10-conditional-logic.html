<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>Exercise 10: Conditional Logic</title>
    <link href="../resources/reset.css" rel="stylesheet" />
    <script src="../resources/jquery.min.js"></script>
    <meta name="viewport" content="width=device-width">

    <style>
        #toggle {
            width: 60px;
            height: 30px;
            background: #666;
            border-radius: 15px;
            border: 1px solid #666;
            box-shadow: 3px 3px 5px #444 inset;
            position: relative;
        }

        #switch {
            position: absolute;
            width: 28px;
            height: 28px;
            background: #eee;
            border-radius: 50%;
            top: 1px;
            left: 1px;
            cursor: pointer;
        }

        table {
            margin: auto;
        }

        #label_on {
            color: #bbb;
        }

        /* jQuery Challenge */
        #slideBox {
            width: 180px;
            height: 80px;
            background: #28659a;
            color: #fff;
            position: fixed;
            top: 200px;
            left: -180px;
        }

        #slideBox p {
            text-align: center;
            line-height: 80px;
            margin: 0;
        }

        #slideTab {
            width: 30px;
            height: 80px;
            position: absolute;
            top: 0;
            left: 180px;
            background: #28659a;
            cursor: pointer;
            line-height: 80px;
            text-align: center;
            font-size: 24px;
        }
    </style>
</head>

<body>

    <h1>Exercise 10: Conditional Logic</h1>

    <table border="0" cellspacing="5" cellpadding="0">
        <tr>
            <td id="label_off">OFF</td>

            <td>
                <figure id="toggle">
                    <figcaption id="switch"></figcaption>
                </figure>
            </td>

            <td id="label_on">ON</td>
        </tr>
    </table>

    <div id="slideBox">
        <p>jQuery is cool!</p>
        <div id="slideTab">&#9656;</div>
    </div>

    <script>
        // your JavaScript goes here

        function toggleSwitch() {
            if ($("#switch").css("left") == "1px") {
                $("#switch").animate(
                    {
                        left: "31px"
                    },
                    300,
                    turnOn
                );
            } else {
                $("#switch").animate(
                    {
                        left: "1px"
                    },
                    300,
                    turnOff
                );
            }
        }

        function turnOn() {
            $("#label_on").css("color", "#000");
            $("#label_off").css("color", "#bbb");
            $("#toggle").css("backgroundColor", "#6c6");
        }

        function turnOff() {
            $("#label_on").css("color", "#bbb");
            $("#label_off").css("color", "#000");
            $("#toggle").css("backgroundColor", "#666");
        }

        function slideBox() {
            if ($("#slideBox").css("left") == "-180px") {
                $("#slideBox").animate(
                    {
                        left: "0px"
                    },
                    500,
                    function () {
                        $("#slideTab").css("transform", "scaleX(-1)");
                    }
                );
            } else {
                $("#slideBox").animate(
                    {
                        left: "-180px"
                    },
                    500,
                    function () {
                        $("#slideTab").css("transform", "scaleX(1)");
                    }
                );
            }
        }

        $("#switch").click(toggleSwitch);
        $("#slideTab").click(slideBox);
    </script>

</body>

</html>
